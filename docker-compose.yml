services:
  mongodb:
    image: mongo
    container_name: mongodb
    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: gbs
      MONGO_INITDB_ROOT_PASSWORD: geheim

    volumes:
      - mongodb_data:/data/db

  webapi:
    build:
      context: ./WebApi

    container_name: webapi

    ports:
      - "5001:5001"

    depends_on:
      - mongodb

    environment:
      DatabaseSettings__ConnectionString: "mongodb://gbs:geheim@mongodb:27017"

volumes:
  mongodb_data: